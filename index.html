<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Fifa World Cup 2026</title>

    <!-- Google Font Link -->
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Host+Grotesk:ital,wght@0,300..800;1,300..800&display=swap"
        rel="stylesheet">

    <!-- font awesome cdn link -->
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/7.0.1/css/all.min.css"
        integrity="sha512-2SwdPD6INVrV/lHTZbO2nodKhrnDdJK9/kg2XD1r9uGqPo1cUbujc+IYdlYdEErWNu69gVcYgdxlmVmzTWnetw=="
        crossorigin="anonymous" referrerpolicy="no-referrer" />

    <!-- CSS link -->
    <link rel="stylesheet" href="./style.css">
</head>

<body>
    <!-- Navbar section start -->
    <nav class="navbar">
        <div class="navbar-content">
            <div>
                <a href="#" class="navbar-logo" aria-label="navbar-logo">
                    <img src="./assets/navbar-logo.png" alt="">
                </a>
            </div>

            <ul class="nav-list">
                <li class="nav-item">
                    <a href="#" class="nav-link">Tournament</a>
                </li>
                <li class="nav-item">
                    <a href="#" class="nav-link">Host Cities</a>
                </li>
                <li class="nav-item">
                    <a href="#" class="nav-link">Groups</a>
                </li>
                <li class="nav-item">
                    <a href="#" class="nav-link">Schedule</a>
                </li>
                <li class="nav-item">
                    <a href="#" class="nav-link">News</a>
                </li>
            </ul>
        </div>

        <div class="navbar-actions">
            <button class="btn btn-common">
                Buy Tickets <i class="fa-solid fa-chevron-right"></i>
            </button>
        </div>
    </nav>
    <!-- Navbar section end -->

    <header class="hero-container">
            <div class="hero-img">
                <img src="./assets/banner.png" alt="banner-Photo" class="hero-image">
            </div>

            <div class="hero-content">
                <h1 class="hero-title text-white">
                    <span class="">One Game.</span>
                    <span>48 Nations.</span> 
                    <span>One World.</span>
                </h1>
                <p class="hero-description  text-white">
                    <span>Witness history in the making as the world’s biggest football</span>
                    <span>tournament scales to unprecedented heights. Secure your</span>
                     <span>place in the stands today.</span>
                </p>

                <button class="btn btn-common">
                    Book Tickets Now <i class="fa-solid fa-chevron-right"></i>
                </button>
            </div>
    </header>

</body>

</html>
